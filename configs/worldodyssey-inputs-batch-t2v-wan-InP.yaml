task: submodule/worldodyssey/inputs
backend_url: http://127.0.0.1:8000

adapter:
  i2v: true
  # The submitter expands direct child folders with task.json into one batch request.
  # Child entries without task.json are recorded in batch metadata as skipped_entries.
  #   prompt_prefix: Generate an egocentric first-person video.

request:
  provider: sglang
  mode: image_to_video
  model: weizhou03/Wan2.1-Fun-1.3B-InP-Diffusers
  options:
    height: 256
    width: 448
    # Wan requires (num_frames - 1) to be divisible by 4; 5 is the smallest
    # smoke-test value that stays a real multi-frame video.
    num_frames: 81
    timeout_seconds: 600

run:
  dry_run: false
  wait: true
  poll_interval_seconds: 5
  wait_timeout_seconds: 600
  download_dir: artifacts/video-backend/worldodyssey-inputs
