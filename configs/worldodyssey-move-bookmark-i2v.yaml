task: compiled_resources/worldodyssey/WorldOdyssey/inputs/move_bookmark
backend_url: http://127.0.0.1:8000

adapter:
  i2v: true
  # prompt_prefix: Generate an egocentric first-person video.

request:
  provider: sglang
  mode: image_to_video
  options:
    height: 480
    width: 832
    num_frames: 81
    timeout_seconds: 900

run:
  dry_run: false
  wait: true
  poll_interval_seconds: 5
  wait_timeout_seconds: 900
  download_path: artifacts/video-backend/worldodyssey-move-bookmark-i2v.mp4
