task: compiled_resources/worldodyssey/WorldOdyssey/inputs
backend_url: http://127.0.0.1:8000

# The submitter expands direct child folders with task.json into one batch request.
# Child entries without task.json are recorded in batch metadata as skipped_entries.
# adapter:
#   prompt_prefix: Generate an egocentric first-person video.

request:
  provider: sglang
  mode: text_to_video
  # The FP8 transformer is supplied to the SGLang server at launch with
  # --transformer-path. Requests still use the loaded base model id.
  model: hunyuanvideo-community/HunyuanVideo
  options:
    height: 128
    width: 128
    num_frames: 5
    num_inference_steps: 1
    seed: 1
    timeout_seconds: 600

run:
  dry_run: false
  wait: true
  poll_interval_seconds: 5
  wait_timeout_seconds: 600
  download_dir: artifacts/video-backend/worldodyssey-inputs-hunyuan-fp8
